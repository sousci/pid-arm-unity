  <text x="2" y="49" fill="#a5a5a5" font-family="Arial" font-size="16">Game</text>
  <text x="122" y="49" fill="#aaa" font-family="Arial" font-size="16">Display 1</text>
  <text x="220" y="49" fill="#aaa" font-family="Arial" font-size="16">Free Aspect</text>
  <text x="666" y="49" fill="#aaa" font-family="Arial" font-size="16">1x</text>
  <text x="1110" y="49" fill="#aaa" font-family="Arial" font-size="16">Gizmos</text>

  <rect x="0" y="58" width="857" height="691" fill="url(#sky)"/>
  <rect x="857" y="58" width="331" height="691" fill="#f2f4f6"/>

  <g>
    <path class="grid" d="M97 75v663M181 75v663M263 75v663M346 75v663M429 75v663M512 75v663M595 75v663M678 75v663M761 75v663"/>
    <path class="grid" d="M129 239h707M129 322h707M129 405h707M129 488h707M129 571h707M129 654h707"/>
  </g>

  <g opacity=".22" stroke="#253245" stroke-width="1.5">
    <path d="M590 88l12-20M627 119l16-15M659 164l20-17M681 205l12-3M686 256h24M680 307l12 3M661 354l19 11M627 397l10 11"/>
  </g>

