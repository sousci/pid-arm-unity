<svg xmlns="http://www.w3.org/2000/svg" width="1188" height="749" viewBox="0 0 1188 749" role="img" aria-labelledby="title desc">
  <title id="title">PID Pendulum Arm simulation screenshot</title>
  <desc id="desc">Unity game view showing a PID controlled pendulum arm, control sliders, response metrics, and an angle versus time graph.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#536e99"/>
      <stop offset="0.47" stop-color="#a8cef0"/>
      <stop offset="0.53" stop-color="#e6ffff"/>
      <stop offset="0.58" stop-color="#77746b"/>
      <stop offset="1" stop-color="#68625d"/>
    </linearGradient>
    <style>
      .uiText{font-family:Arial,Helvetica,sans-serif;fill:#222;font-size:12px}
      .small{font-size:11px}
      .label{font-size:18px;font-weight:700}
      .buttonText{fill:#fff;font-size:14px;font-weight:700}
      .grid{stroke:#4d607d;stroke-width:1;opacity:.22}
      .graphGrid{stroke:#222;stroke-width:1;opacity:.25}
    </style>
  </defs>

  <rect width="1188" height="749" fill="#202020"/>
